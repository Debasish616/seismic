<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" width="360" height="64" role="img" aria-label="Seismic">
  <style>
    .wordmark { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
    .wordmark-name { font-size: 30px; fill: #FAFAFA; }
    .wordmark-tag  { font-size: 13px; fill: #9CA3AF; font-weight: 500; letter-spacing: 0.02em; }
    .mark { fill: #FAFAFA; }
  </style>
  <g transform="translate(8 12)">
    <rect class="mark" x="0"  y="20" width="6" height="20" rx="1.5"/>
    <rect class="mark" x="10" y="12" width="6" height="28" rx="1.5"/>
    <rect class="mark" x="20" y="4"  width="6" height="36" rx="1.5"/>
    <rect class="mark" x="30" y="12" width="6" height="28" rx="1.5"/>
    <rect class="mark" x="40" y="20" width="6" height="20" rx="1.5"/>
  </g>
  <text x="68" y="36"  class="wordmark wordmark-name">Seismic</text>
  <text x="68" y="54"  class="wordmark wordmark-tag">CARDS API</text>
</svg>
